<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" width="1200" height="620">
  <rect width="1200" height="620" fill="#0f121e"/>
  <g font-family="Arial, sans-serif">
    <text x="60" y="60" font-size="16" fill="#f3f4f6" font-weight="700">Design System / Style Guide v2.1</text>

    <!-- color swatches -->
    <text x="60" y="100" font-size="12" fill="#9ca3af" letter-spacing="1">COLOR PALETTE</text>
    <rect x="60" y="112" width="90" height="60" rx="8" fill="#5B7CFF"/>
    <rect x="160" y="112" width="90" height="60" rx="8" fill="#10b981"/>
    <rect x="260" y="112" width="90" height="60" rx="8" fill="#f59e0b"/>
    <rect x="360" y="112" width="90" height="60" rx="8" fill="#ef4444"/>
    <rect x="460" y="112" width="90" height="60" rx="8" fill="#171d30" stroke="#4b5568"/>
    <rect x="560" y="112" width="90" height="60" rx="8" fill="#f3f4f6"/>

    <!-- typography -->
    <text x="60" y="220" font-size="12" fill="#9ca3af" letter-spacing="1">TYPOGRAPHY</text>
    <text x="60" y="256" font-size="30" fill="#f3f4f6" font-weight="700">Aa Heading / 32px</text>
    <text x="60" y="284" font-size="16" fill="#d1d5db">Aa Body Regular / 16px</text>
    <text x="60" y="306" font-size="12" fill="#9ca3af">Aa Caption / Label / 12px</text>

    <!-- buttons -->
    <text x="60" y="360" font-size="12" fill="#9ca3af" letter-spacing="1">COMPONENTS</text>
    <rect x="60" y="374" width="130" height="40" rx="20" fill="#5B7CFF"/>
    <text x="125" y="399" text-anchor="middle" font-size="13" fill="#ffffff">Primary</text>
    <rect x="204" y="374" width="130" height="40" rx="20" fill="none" stroke="#4b5568"/>
    <text x="269" y="399" text-anchor="middle" font-size="13" fill="#d1d5db">Secondary</text>
    <rect x="348" y="374" width="110" height="40" rx="8" fill="#171d30" stroke="#232a40"/>
    <text x="403" y="399" text-anchor="middle" font-size="12" fill="#9ca3af">Input field</text>

    <!-- cards -->
    <rect x="60" y="440" width="220" height="120" rx="12" fill="#171d30" stroke="#232a40"/>
    <rect x="80" y="460" width="60" height="60" rx="10" fill="#5B7CFF" opacity="0.25"/>
    <rect x="152" y="464" width="110" height="10" rx="4" fill="#d1d5db"/>
    <rect x="152" y="482" width="80" height="8" rx="4" fill="#6b7280"/>

    <rect x="300" y="440" width="220" height="120" rx="12" fill="#171d30" stroke="#232a40"/>
    <circle cx="340" cy="490" r="20" fill="#10b981" opacity="0.25"/>
    <rect x="372" y="480" width="110" height="10" rx="4" fill="#d1d5db"/>
    <rect x="372" y="498" width="80" height="8" rx="4" fill="#6b7280"/>

    <!-- right column: icons/grid -->
    <text x="700" y="100" font-size="12" fill="#9ca3af" letter-spacing="1">ICONOGRAPHY &amp; GRID</text>
    <g fill="#5B7CFF" opacity="0.7">
      <circle cx="720" cy="140" r="14"/>
      <circle cx="764" cy="140" r="14"/>
      <circle cx="808" cy="140" r="14"/>
      <circle cx="852" cy="140" r="14"/>
      <circle cx="896" cy="140" r="14"/>
    </g>
    <g stroke="#232a40">
      <line x1="700" y1="180" x2="1140" y2="180"/>
      <line x1="700" y1="220" x2="1140" y2="220"/>
      <line x1="700" y1="260" x2="1140" y2="260"/>
      <line x1="700" y1="300" x2="1140" y2="300"/>
      <line x1="700" y1="340" x2="1140" y2="340"/>
    </g>
    <rect x="700" y="180" width="1" height="160" fill="#232a40"/>
    <rect x="810" y="180" width="1" height="160" fill="#232a40"/>
    <rect x="920" y="180" width="1" height="160" fill="#232a40"/>
    <rect x="1030" y="180" width="1" height="160" fill="#232a40"/>
    <rect x="1140" y="180" width="1" height="160" fill="#232a40"/>
    <text x="700" y="380" font-size="11" fill="#6b7280">8px baseline grid • 110px column • 24px gutter</text>

    <rect x="700" y="420" width="440" height="140" rx="12" fill="#171d30" stroke="#232a40"/>
    <rect x="724" y="444" width="140" height="10" rx="4" fill="#d1d5db"/>
    <rect x="724" y="470" width="80" height="34" rx="8" fill="#10b981" opacity="0.2"/>
    <rect x="814" y="470" width="80" height="34" rx="8" fill="#5B7CFF" opacity="0.2"/>
    <rect x="904" y="470" width="80" height="34" rx="8" fill="#f59e0b" opacity="0.2"/>
    <rect x="724" y="520" width="392" height="20" rx="10" fill="#0d1120"/>
  </g>
  <text x="600" y="600" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" letter-spacing="2" fill="#5B7CFF" opacity="0.7">DESIGN SYSTEM PREVIEW</text>
</svg>

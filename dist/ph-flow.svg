<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" width="1200" height="620">
  <rect width="1200" height="620" fill="#0f121e"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5B7CFF"/>
    </marker>
  </defs>
  <!-- row 1 -->
  <g font-family="Arial, sans-serif">
    <rect x="40" y="60" width="150" height="64" rx="10" fill="#171d30" stroke="#5B7CFF" stroke-opacity="0.5"/>
    <text x="115" y="97" text-anchor="middle" font-size="13" fill="#e5e7eb">App Launch</text>

    <line x1="190" y1="92" x2="248" y2="92" stroke="#5B7CFF" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="250" y="60" width="150" height="64" rx="10" fill="#171d30" stroke="#232a40"/>
    <text x="325" y="97" text-anchor="middle" font-size="13" fill="#e5e7eb">Login / Signup</text>

    <line x1="400" y1="92" x2="458" y2="92" stroke="#5B7CFF" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="460" y="60" width="160" height="64" rx="10" fill="#171d30" stroke="#232a40"/>
    <text x="540" y="90" text-anchor="middle" font-size="13" fill="#e5e7eb">Identity</text>
    <text x="540" y="106" text-anchor="middle" font-size="13" fill="#e5e7eb">Verification</text>

    <line x1="620" y1="92" x2="678" y2="92" stroke="#5B7CFF" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="680" y="60" width="160" height="64" rx="10" fill="#171d30" stroke="#232a40"/>
    <text x="760" y="97" text-anchor="middle" font-size="13" fill="#e5e7eb">Decision Point</text>

    <!-- branch down -->
    <line x1="760" y1="124" x2="760" y2="176" stroke="#5B7CFF" stroke-width="2"/>
    <line x1="760" y1="176" x2="500" y2="176" stroke="#5B7CFF" stroke-width="2"/>
    <line x1="500" y1="176" x2="500" y2="234" stroke="#5B7CFF" stroke-width="2" marker-end="url(#arrow)"/>

    <line x1="760" y1="176" x2="1020" y2="176" stroke="#10b981" stroke-width="2"/>
    <line x1="1020" y1="176" x2="1020" y2="234" stroke="#10b981" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="410" y="236" width="180" height="64" rx="10" fill="#171d30" stroke="#f59e0b" stroke-opacity="0.5"/>
    <text x="500" y="266" text-anchor="middle" font-size="12" fill="#e5e7eb">Needs More Info</text>
    <text x="500" y="284" text-anchor="middle" font-size="11" fill="#9ca3af">(re-upload / retry)</text>

    <rect x="930" y="236" width="180" height="64" rx="10" fill="#171d30" stroke="#10b981" stroke-opacity="0.6"/>
    <text x="1020" y="266" text-anchor="middle" font-size="12" fill="#e5e7eb">Verified</text>
    <text x="1020" y="284" text-anchor="middle" font-size="11" fill="#9ca3af">continue to product</text>

    <line x1="500" y1="300" x2="500" y2="176" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.5"/>

    <line x1="1020" y1="300" x2="1020" y2="360" stroke="#10b981" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="900" y="362" width="220" height="70" rx="10" fill="#171d30" stroke="#232a40"/>
    <text x="1010" y="392" text-anchor="middle" font-size="12" fill="#e5e7eb">Primary Task Screen</text>
    <text x="1010" y="410" text-anchor="middle" font-size="11" fill="#9ca3af">(dashboard / action)</text>

    <line x1="900" y1="397" x2="700" y2="397" stroke="#5B7CFF" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="500" y="362" width="200" height="70" rx="10" fill="#171d30" stroke="#232a40"/>
    <text x="600" y="392" text-anchor="middle" font-size="12" fill="#e5e7eb">Confirmation</text>
    <text x="600" y="410" text-anchor="middle" font-size="11" fill="#9ca3af">&amp; next best action</text>

    <line x1="500" y1="397" x2="300" y2="397" stroke="#5B7CFF" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="80" y="362" width="220" height="70" rx="10" fill="#171d30" stroke="#232a40"/>
    <text x="190" y="392" text-anchor="middle" font-size="12" fill="#e5e7eb">Success State</text>
    <text x="190" y="410" text-anchor="middle" font-size="11" fill="#9ca3af">+ contextual guidance</text>
  </g>
  <text x="600" y="520" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" letter-spacing="2" fill="#5B7CFF" opacity="0.8">USER FLOW DIAGRAM PREVIEW</text>
</svg>
